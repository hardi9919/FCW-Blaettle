name: E-Mail zu PDF verarbeiten

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Abhaengigkeiten installieren
        run: pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib requests

      - name: E-Mails pruefen und PDFs herunterladen
        id: check_email
        env:
          GMAIL_CREDENTIALS: ${{ secrets.GMAIL_CREDENTIALS }}
          GMAIL_TOKEN:       ${{ secrets.GMAIL_TOKEN }}
        run: |
          OUTPUT=$(python scripts/check_email.py)
          echo "$OUTPUT"
          TITLES=$(echo "$OUTPUT" | grep "^PUSH_TITLE:" | sed 's/^PUSH_TITLE://' | tr '\n' '|')
          echo "push_titles=$TITLES" >> $GITHUB_OUTPUT

      - name: PDF-Index aktualisieren
        run: python scripts/update_index.py

      - name: Aenderungen committen und pushen
        id: commit
        run: |
          git config user.name  "FCW Bot"
          git config user.email "bot@fcweisingen.de"
          git add docs/pdfs/
          if git diff --staged --quiet; then
            echo "Keine neuen PDFs."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            TIMESTAMP=$(date +%s)
            sed -i "s/BUILD: [0-9]*/BUILD: ${TIMESTAMP}/" docs/sw.js
            git add docs/sw.js
            git commit -m "Neue Ausgabe hinzugefuegt [automatisch]"
            git push
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Warten bis GitHub Pages deployed ist
        if: steps.commit.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Warte auf GitHub Pages Deployment..."
          for i in $(seq 1 12); do
            sleep 15
            STATUS=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/hardi9919/FCW-Blaettle/deployments?environment=github-pages&per_page=1" \
              | python3 -c "
import sys, json, urllib.request, os
deps = json.load(sys.stdin)
if not deps: print('pending'); exit()
dep_id = deps[0]['id']
token = os.environ['GH_TOKEN']
req = urllib.request.Request(
  f'https://api.github.com/repos/hardi9919/FCW-Blaettle/deployments/{dep_id}/statuses?per_page=1',
  headers={'Authorization': f'Bearer {token}', 'Accept': 'application/vnd.github+json'}
)
statuses = json.loads(urllib.request.urlopen(req).read())
print(statuses[0]['state'] if statuses else 'pending')
")
            echo "Status ($i/24): $STATUS"
            if [ "$STATUS" = "success" ]; then
              echo "GitHub Pages ist live!"
              break
            fi
          done

      - name: Push-Benachrichtigung senden
        if: steps.commit.outputs.has_changes == 'true'
        env:
          ONESIGNAL_APP_ID:  ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
          PUSH_TITLES:       ${{ steps.check_email.outputs.push_titles }}
        run: |
          python - << 'EOF'
          import os, requests
          app_id  = os.environ["ONESIGNAL_APP_ID"]
          api_key = os.environ["ONESIGNAL_API_KEY"]
          url     = "https://hardi9919.github.io/FCW-Blaettle/"
          titles  = [t for t in os.environ.get("PUSH_TITLES","").split("|") if t.strip()]
          title   = titles[0] if titles else "Neue Ausgabe"
          res = requests.post("https://onesignal.com/api/v1/notifications",
              headers={"Authorization": f"Key {api_key}", "Content-Type": "application/json"},
              json={"app_id": app_id, "included_segments": ["All"],
                    "headings": {"en": "FCW-Blaettle", "de": "FCW-Blaettle"}, "url": url,
                    "contents": {"en": f"Neue Ausgabe: {title}", "de": f"Neue Ausgabe: {title} ist jetzt verfuegbar!"}},
              timeout=15)
          print(f"Push Status: {res.status_code} | {res.text}")
          EOF
