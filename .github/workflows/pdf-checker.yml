name: E-Mail zu PDF verarbeiten

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Abhaengigkeiten installieren
        run: pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib requests

      - name: E-Mails pruefen und PDFs herunterladen
        id: check_email
        env:
          GMAIL_CREDENTIALS: ${{ secrets.GMAIL_CREDENTIALS }}
          GMAIL_TOKEN:       ${{ secrets.GMAIL_TOKEN }}
        run: |
          OUTPUT=$(python scripts/check_email.py)
          echo "$OUTPUT"
          TITLES=$(echo "$OUTPUT" | grep "^PUSH_TITLE:" | sed 's/^PUSH_TITLE://' | tr '\n' '|')
          echo "push_titles=$TITLES" >> $GITHUB_OUTPUT

      - name: PDF-Index aktualisieren
        run: python scripts/update_index.py

      - name: Aenderungen committen und pushen
        id: commit
        run: |
          git config user.name  "FCW Bot"
          git config user.email "bot@fcweisingen.de"
          git add docs/pdfs/
          if git diff --staged --quiet; then
            echo "Keine neuen PDFs."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            TIMESTAMP=$(date +%s)
            sed -i "s/BUILD: [0-9]*/BUILD: ${TIMESTAMP}/" docs/sw.js
            git add docs/sw.js
            git commit -m "Neue Ausgabe hinzugefuegt [automatisch]"
            git push
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Warten bis GitHub Pages deployed ist
        if: steps.commit.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/wait_deploy.py

      - name: Push-Benachrichtigung senden
        if: steps.commit.outputs.has_changes == 'true'
        env:
          ONESIGNAL_APP_ID:  ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
          PUSH_TITLES:       ${{ steps.check_email.outputs.push_titles }}
        run: python scripts/send_push.py
