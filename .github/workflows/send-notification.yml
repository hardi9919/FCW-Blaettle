name: Push-Benachrichtigung senden

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types: [completed]

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pruefen ob Push-Benachrichtigung aussteht
        id: check
        run: |
          if [ -f "docs/pending_push.txt" ]; then
            TITLE=$(cat docs/pending_push.txt)
            echo "title=$TITLE" >> $GITHUB_OUTPUT
            echo "send=true" >> $GITHUB_OUTPUT
          else
            echo "send=false" >> $GITHUB_OUTPUT
          fi

      - name: 30 Sekunden warten
        if: steps.check.outputs.send == 'true'
        run: sleep 30

      - uses: actions/setup-python@v5
        if: steps.check.outputs.send == 'true'
        with:
          python-version: "3.11"

      - name: Abhaengigkeiten installieren
        if: steps.check.outputs.send == 'true'
        run: pip install requests

      - name: Push-Benachrichtigung senden
        if: steps.check.outputs.send == 'true'
        env:
          ONESIGNAL_APP_ID:  ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
          PUSH_TITLES:       ${{ steps.check.outputs.title }}
        run: python scripts/send_push.py

      - name: pending_push.txt loeschen
        if: steps.check.outputs.send == 'true'
        run: |
          git config user.name  "FCW Bot"
          git config user.email "bot@fcweisingen.de"
          git pull --rebase
          git rm docs/pending_push.txt
          git commit -m "Push-Benachrichtigung gesendet [skip ci]"
          git push
