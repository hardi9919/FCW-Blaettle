name: PDF-Index synchronisieren

on:
  push:
    branches: [main]
    paths:
      - 'docs/pdfs/**.pdf'   # Nur wenn PDFs geaendert/geloescht werden

permissions:
  contents: write

jobs:
  sync-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: index.json aktualisieren
        run: python scripts/update_index.py

      - name: Committen und pushen
        run: |
          git config user.name  "FCW Bot"
          git config user.email "bot@fcweisingen.de"
          for attempt in 1 2 3 4 5; do
            git checkout -- docs/pdfs/index.json 2>/dev/null || true
            git pull --rebase
            python scripts/update_index.py
            git add docs/pdfs/index.json
            if git diff --staged --quiet; then
              echo "index.json unveraendert."
              break
            fi
            git commit -m "index.json synchronisiert [automatisch]"
            if git push; then
              echo "Push erfolgreich."
              break
            fi
            echo "Push fehlgeschlagen, erneuter Versuch ($attempt/5)..."
            git reset HEAD~1
            sleep 3
          done
